name: VB eredmények frissítése

on:
  schedule:
    # 15 percenként fut (UTC). Élő meccs alatt is frissíti az aktuális állást.
    # Forrás: football-data.org (ingyenes tier: 10 kérés/perc – bőven elég).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Eredmények lehúzása
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/refresh.mjs

      - name: Változás commitolása
        run: |
          if [[ -n "$(git status --porcelain results.json)" ]]; then
            git config user.name "vb-bot"
            git config user.email "vb-bot@users.noreply.github.com"
            git add results.json
            git commit -m "VB eredmények frissítve ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "Nincs változás."
          fi
