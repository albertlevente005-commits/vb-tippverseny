name: VB eredmenyek frissitese

on:
  schedule:
    - cron: "0 */30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Eredmenyek lehuzasa
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/refresh.mjs
      - name: Valtozas commitolasa
        run: |
          if [[ -n "$(git status --porcelain results.json)" ]]; then
            git config user.name "vb-bot"
            git config user.email "vb-bot@users.noreply.github.com"
            git add results.json
            git commit -m "VB eredmenyek frissitve"
            git push
          fi
